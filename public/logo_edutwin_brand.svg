  <!-- Flamme / spark au dessus du livre -->
  <path d="M100 56 C100 56 88 44 92 34 C94 28 98 30 100 36 C102 30 106 28 108 34 C112 44 100 56 100 56Z" fill="#7C3AED" style="fill:rgb(124, 58, 237);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
